name: Set up Android release signing
description: >
  Recreate the gitignored android/key.properties and keystore from the
  ANDROID_KEYSTORE_BASE64 secret so every CI APK is signed with the same
  stable release key. Without it the build falls back to the runner's freshly
  generated debug keystore, which gives every APK a different signature —
  Android then refuses to install an update over an existing install until
  the app is uninstalled. The keystore uses fixed alias/password "mirushin":
  the password only protects the file itself, and the file lives exclusively
  in this secret (and the maintainer's backup).

inputs:
  keystore-base64:
    description: Base64-encoded release keystore (ANDROID_KEYSTORE_BASE64).
    required: true

runs:
  using: composite
  steps:
    - name: Write keystore and key.properties
      shell: bash
      env:
        KEYSTORE_BASE64: ${{ inputs.keystore-base64 }}
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "::error::ANDROID_KEYSTORE_BASE64 secret is empty. Run 'base64 -i android/release.keystore' locally and add the output as a repository secret named ANDROID_KEYSTORE_BASE64 (Settings → Secrets and variables → Actions). Debug-signed CI APKs cannot be installed over each other."
          exit 1
        fi
        printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/release.keystore
        {
          printf 'storeFile=../release.keystore\n'
          printf 'storePassword=mirushin\n'
          printf 'keyAlias=mirushin\n'
          printf 'keyPassword=mirushin\n'
        } > android/key.properties
        echo "Wrote android/key.properties and android/release.keystore ($(wc -c < android/release.keystore) bytes)."
