name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: MiruShin
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java (17)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate .env (TMDB key)
        uses: ./.github/actions/generate-env
        with:
          tmdb-read-access-token: ${{ secrets.TMDB_READ_ACCESS_TOKEN }}
          module-library-url: ${{ secrets.MODULE_LIBRARY_URL }}

      - name: Set up Android release signing
        uses: ./.github/actions/android-signing
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Prepare Android version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION="${VERSION_LINE%%+*}"
          PUBSPEC_BUILD="${VERSION_LINE#*+}"
          BUILD_NUMBER=$(($(date -u +%s) / 60))
          if [[ "$PUBSPEC_BUILD" =~ ^[0-9]+$ ]] && [ "$BUILD_NUMBER" -le "$PUBSPEC_BUILD" ]; then
            BUILD_NUMBER=$((PUBSPEC_BUILD + 1))
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building Android $VERSION+$BUILD_NUMBER"

      - name: Build APK (release)
        run: flutter build apk --release --build-name "${{ steps.ver.outputs.version }}" --build-number "${{ steps.ver.outputs.build_number }}"

      - name: Rename APK to MiruShin-android-vX.Y.Z.apk
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          SRC_APK=$(find build/app/outputs/flutter-apk -maxdepth 1 -type f -name '*.apk' | head -n 1)
          if [ -z "$SRC_APK" ]; then
            echo "ERROR: no APK found in build/app/outputs/flutter-apk"
            exit 1
          fi
          VERSION="${{ steps.ver.outputs.version }}"
          DEST_APK="${APP_NAME}-android-v${VERSION}.apk"
          cp "$SRC_APK" "$DEST_APK"
          echo "apk_path=$DEST_APK" >> "$GITHUB_OUTPUT"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: MiruShin-android
          path: ${{ steps.apk.outputs.apk_path }}
