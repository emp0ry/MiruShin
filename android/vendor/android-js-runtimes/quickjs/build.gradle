plugins {
    id 'com.android.library'
}

group = 'com.github.fast-development.android-js-runtimes'
version = '0.3.6'

android {
    namespace 'io.abner.fastdev.android.quickjs'
    compileSdk 36
    ndkVersion '28.2.13676358'

    externalNativeBuild {
        // Encapsulates your CMake build configurations.
        cmake {
            // Provides a relative path to your CMake build script.
            path "CMakeLists.txt"
        }
    }

    defaultConfig {
        minSdk 21
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }
}
