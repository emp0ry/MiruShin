name: mirushin
description: "New way to watch and discover media."
publish_to: 'none'
version: 2.2.0+41

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  dio: ^5.9.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  path: ^1.9.1
  file_selector: ^1.1.0
  flutter_file_dialog: ^3.0.3
  share_plus: ^12.0.1
  xml: ^6.6.1
  flutter_js: ^0.8.7
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.1
  webview_win_floating: ^3.0.3
  # Used only for the Cloudflare challenge solver: unlike webview_flutter it can
  # read HttpOnly cookies (cf_clearance) and covers Android/iOS/macOS/Windows.
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^10.0.0
  flutter_local_notifications: ^21.0.0
  video_player: ^2.11.1
  fvp: ^0.36.2
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_windows_video: ^1.0.11
  wakelock_plus: ^1.5.2
  timezone: ^0.11.0
  package_info_plus: ^9.0.1
  envied: ^1.3.5
  crypto: ^3.0.7
  # Watch-party synchronized playback: P2P sync over WebRTC DataChannel, with QR
  # code pairing (generate + scan) as a fallback to manual room codes.
  flutter_webrtc: ^1.4.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  envied_generator: ^1.3.5
  build_runner: ^2.15.0

flutter_native_splash:
  color: "#0a0011"
  image: assets/icons/splash.png
  ios: true
  android: true
  android_12:
    image: assets/icons/splash_alt.png
    icon_background_color: "#0a0011"
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#0a0011"
  adaptive_icon_foreground: "assets/icons/adaptive.png"
  macos:
    generate: true
    image_path: assets/icons/logo.png
  flavors:
    main:
      image_path: "assets/icons/logo.png"
      adaptive_icon_background: "#0a0011"
      adaptive_icon_foreground: "assets/icons/adaptive.png"
    dev:
      image_path: "assets/icons/logo.png"
      adaptive_icon_background: "#0a0011"
      adaptive_icon_foreground: "assets/icons/adaptive.png"

flutter:
  uses-material-design: true
  assets:
    - lib/l10n/
